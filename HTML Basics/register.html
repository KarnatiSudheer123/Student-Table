<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="register.css">
    <title>Register Page</title>
</head>
<body>
    <div class="register-box">
        <h1>Register</h1>
        <form>
            <div class="input-group">
                <label>Full Name:</label>
                <input type="name" required placeholder="Enter Full Name">
            </div>
            <br>
            <div class="input-group">
                <label>Email ID:</label>
                <input type="email id" required placeholder="Enter email id">
            </div>
            <br>
            <div class="input-group">
                <label>Password:</label>
                <input type="password" required placeholder="Enter password">
            </div>
            <br>
            <div class="input-group">
                <label>Confirm Password:</label>
                <input type="confirm password" required placeholder="Enter confirm password">
            </div>
            <br>
            <button class="button">REGISTER</button>
        </form>
        <div class="login-link">Already have an account?<a href="#">Login</a>
        </div>
    </div>
    <script src="register.js"></script>
</body>
</html>
